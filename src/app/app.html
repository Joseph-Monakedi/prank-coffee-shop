<div class="h-full flex flex-col" [class.cursor-none]="cursorService.isLocked()">
  <header class="p-5 px-10 flex justify-between items-center border-b border-white/5 bg-black/30">
    <div class="flex items-center gap-4">
      <span class="text-3xl">☕</span>
      <div>
        <h1 class="text-xl font-semibold m-0 tracking-tight">Artisan Brew</h1>
        <p class="text-[11px] text-text-dim m-0 uppercase tracking-widest">Premium Coffee Lab</p>
      </div>
    </div>
   
  </header>

  <div class="flex-1 flex overflow-hidden">
    <main class="flex-1 overflow-hidden">
      <app-menu></app-menu>
    </main>

    <aside class="h-full">
      <app-cart (checkout)="checkout()"></app-cart>
    </aside>
  </div>

  @if (prankService.showDiscount()) {
    <app-discount-popup (dismiss)="prankService.showDiscount.set(false)"></app-discount-popup>
  }

  @if (prankService.showDonationPopup()) {
    <app-donation-popup (confirm)="confirmDonation()"></app-donation-popup>
  }

  @if (prankService.showPaymentPage()) {
    <app-payment-page [orderTotal]="cartService.totalPrice()" (restart)="restart()"></app-payment-page>
  }

  @if (!cursorService.isLocked()) {
    <app-welcome-overlay (started)="resume()"></app-welcome-overlay>
  }

  <div class="fake-cursor" [style.left.px]="cursorService.x()" [style.top.px]="cursorService.y()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5.65376 12.3822L15.4602 15.2217L12.6206 5.4153L5.65376 12.3822Z" fill="white" stroke="black" stroke-width="2" stroke-linejoin="round"/>
    </svg>
  </div>
</div>
